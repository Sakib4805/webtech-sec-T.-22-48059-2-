<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechFlow - Login & Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:20%;
    background:linear-gradient(135deg,#202122,#1c1c1d);
    color:white;
    padding:20px 15px;
    display:flex;
    flex-direction:column;
}

.sidebar h1{
    text-align:center;
    margin-bottom:40px;
}

.menu{
    list-style:none;
}

.menu li{
    margin:20px 0;
}

.menu a{
    text-decoration:none;
    color:rgb(255, 255, 255);
    font-size:18px;
    padding:10px;
    display:block;
    border-radius:5px;
}

.menu a:hover{
    background: #3d721e;
}

/* Main */
.main{
    width:75%;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Form Box */
.form-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    position:absolute;
    display:none;
}

.form-box h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background: #3d721e;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3d721e;
}

/* Default show Registration */
#register{
    display:block;
}

/* When login is clicked */
#login:target{
    display:block;
}

#login:target ~ #register{
    display:none;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h1>TechFlow</h1>

    <ul class="menu">
        <li><a href="#login">Login </a></li>
        <li><a href="#register">Registration</a></li>
    </ul>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Login Form -->
    <div class="form-box" id="login">
        align-items left;
        <h2> Login </h2>
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="" required>
            </div>

            <button type="submit"><b>Sign In </b></button>
        </form>
    </div>

    <!-- Registration Form -->
    <div class="form-box" id="register">
        <h2>Create Account</h2>
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <button type="submit"><b>Registration</b></button>
        </form>
    </div>

</div>

</body>
</html>
